repos:
  - repo: local
    hooks:
      - id: stubgen
        name: Generate or Update Stubs
        entry: bash -c 'stubgen "$@" -o . && git add **/*.pyi' --
        language: system
        files: ^pybotchi/
        exclude: \.pyi$
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
        exclude: \.pyi$
      - id: ruff-format
        exclude: \.pyi$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        exclude: ^pybotchi/grpc/pybotchi_pb2|^examples/|\.pyi$
        additional_dependencies:
          [types-protobuf, types-aiofiles, mypy-protobuf, mcp, grpcio]
